services:
  - type: web
    name: nami-discord-bot
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: CARTESIA_VERSION
        value: "2026-03-01"
      - key: CARTESIA_MODEL
        value: sonic-3
      - key: USE_SUPABASE_STORAGE
        value: "false"
      - key: OPENROUTER_MODEL
        value: nvidia/nemotron-3-super-120b-a12b:free
      - key: VENICE_MODEL
        value: venice-uncensored
      - key: ELEVENLABS_MODEL_ID
        value: eleven_flash_v2_5