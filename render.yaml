services:
  - type: web
    name: nami-discord-bot
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENROUTER_MODEL
        value: nvidia/nemotron-3-super-120b-a12b:free
      - key: VENICE_MODEL
        value: venice-uncensored
      - key: ELEVENLABS_MODEL_ID
        value: eleven_flash_v2_5