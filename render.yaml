services:
  - type: web
    name: nami-discord-bot
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: OLLAMA_BASE_URL
        value: https://ollama.com
      - key: OLLAMA_MODEL
        value: llama3.1:8b
      - key: OLLAMA_FALLBACK_MODELS
        value: gpt-oss:120b,gpt-oss:120b-cloud
      - key: USE_SUPABASE_STORAGE
        value: "false"
      - key: SUPABASE_TTS_BUCKET
        sync: false
      - key: SUPABASE_TTS_BUCKET_PREFIX
        value: tts-cache
      - key: INTERNAL_KEEPALIVE_ENABLED
        value: "true"
      - key: INTERNAL_KEEPALIVE_INTERVAL_MINUTES
        value: "14"
      - key: OPENROUTER_MODEL
        value: nvidia/nemotron-3-super-120b-a12b:free
      - key: TTS_MAX_CHARS
        value: "250"
      - key: TTS_COOLDOWN_SECONDS
        value: "2"
      - key: TTS_DAILY_USER_REQUEST_LIMIT
        value: "300"
      - key: TTS_DAILY_USER_CHARACTER_LIMIT
        value: "75000"
      - key: TTS_DAILY_GUILD_REQUEST_LIMIT
        value: "3000"
      - key: TTS_DAILY_GUILD_CHARACTER_LIMIT
        value: "600000"
      - key: TTS_DAILY_GLOBAL_REQUEST_LIMIT
        value: "12000"
      - key: TTS_DAILY_GLOBAL_CHARACTER_LIMIT
        value: "2400000"
